"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_yellow)\
$directory\
[î‚°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[î‚°](fg:color_aqua bg:color_bg1)\
$time\
[î‚´ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 255
truncate_to_repo = false

[git_branch]
symbol = "ïگک"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'
modified = 'M${count}'
staged = '+${count}'
untracked = '?${count}'
deleted = 'D${count}'
renamed = 'R${count}'
stashed = '$$${count}'
ahead = 'â‡،${count}'
behind = 'â‡£${count}'
diverged = 'â‡،${ahead_count}â‡£${behind_count}'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ïگ؛ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ïگ²](bold fg:color_green)'
error_symbol = '[ïگ²](bold fg:color_red)'
vimcmd_symbol = '[ïگ²](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ïگ²](bold fg:color_purple)'
vimcmd_replace_symbol = '[ïگ²](bold fg:color_purple)'
vimcmd_visual_symbol = '[ïگ²](bold fg:color_yellow)'
